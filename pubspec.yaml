name: flutter_app
description: "이케다 지에의 아침 1시간 방법론 기반 업무 계획관리 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3
  intl: ^0.20.2
  uuid: ^4.5.1
  table_calendar: ^3.1.2
  google_mlkit_digital_ink_recognition: any

  # 푸시 알림 및 시간 스케줄링
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

  # 데이터 내보내기용
  csv: ^6.0.0
  share_plus: ^10.1.0
  path_provider: ^2.1.4

  # 홈 화면 위젯 연동
  home_widget: ^0.3.1

  # 애니메이션 / 음성 인식
  lottie: ^3.1.2
  confetti: ^0.7.0
  speech_to_text: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: 2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/growth/

  
  # [추가할 패키지] 푸시 알림 및 시간 스케줄링
flutter_local_notifications: ^17.1.2
timezone: ^0.9.2

 # [추가할 패키지] 데이터 내보내기용
csv: ^6.0.0
share_plus: ^10.1.0
path_provider: ^2.1.4 # (파일을 임시 저장할 경로를 찾기 위해 필요합니다)

# [추가할 패키지] 홈 화면 위젯 연동
home_widget: ^0.3.1

# [추가할 패키지] 아이디어 3 & 4
lottie: ^3.1.2       # 움직이는 캐릭터 애니메이션
confetti: ^0.7.0     # 레벨업/달성 시 폭죽 효과
speech_to_text: ^6.6.0 # 음성 인식 (STT)
