name: flutter_app
description: "이케다 지에의 아침 1시간 방법론 기반 업무 계획관리 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리 (앱 전체 데이터 변경 감지 및 화면 갱신)
  provider: 6.1.5+1

  # 로컬 데이터베이스 (할 일, 노트 등 구조화된 데이터를 기기에 저장)
  hive: 2.2.3
  hive_flutter: 1.1.0

  # 간단한 설정값 저장 (다크모드 여부 등)
  shared_preferences: 2.5.3

  # 날짜/시간 형식 표시 (예: 2026년 7월 10일 금요일)
  intl: ^0.20.2

  # 고유 ID 생성 (할 일, 노트마다 구분되는 id 부여)
  uuid: ^4.5.1

  # 월간 캘린더 위젯 (전체 일정을 한 달 단위로 보고 날짜 이동)
  table_calendar: ^3.1.2
  
  google_mlkit_digital_ink_recognition: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Hive 데이터 모델의 어댑터 코드를 자동 생성하기 위한 도구
  hive_generator: 2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/growth/
